<title>CRUDE OPS — Intelligence Platform</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
:root{--bg0:#050608;--bg1:#0a0c10;--bg2:#0f1117;--bg3:#161a22;--amber:#e8952a;--adim:#b8721a;--aglow:rgba(232,149,42,0.15);--cyan:#2de0c8;--red:#e83a3a;--green:#2de87a;--yellow:#f59e0b;--tp:#e8e4d8;--td:#6b7280;--border:rgba(232,149,42,0.2);--bb:rgba(232,149,42,0.6)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Barlow Condensed',sans-serif;background:var(--bg0);color:var(--tp)}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:44px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:2px;flex-shrink:0;z-index:1000;overflow-x:auto}
.topbar::-webkit-scrollbar{display:none}
.logo{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--amber);letter-spacing:.18em;margin-right:10px;white-space:nowrap}
.navtab{padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.navtab.active{color:var(--amber);border-color:var(--border);background:var(--aglow)}
.navtab.intel{color:#a78bfa}
.navtab.intel.active{color:#a78bfa;border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.1)}
.ml{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-left:10px}
.livebadge{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green);white-space:nowrap}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--td);white-space:nowrap}
.main{display:flex;flex:1;overflow:hidden}
.lp{width:245px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ptitle{font-size:9px;font-weight:700;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
.vcount{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--td)}
.frow{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;gap:5px}
.fb{padding:3px 9px;font-size:9px;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--td);cursor:pointer;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;transition:all .15s}
.fb.active{border-color:var(--amber);color:var(--amber);background:var(--aglow)}
.vlist{flex:1;overflow-y:auto;padding:3px 0}
.vlist::-webkit-scrollbar{width:2px}
.vlist::-webkit-scrollbar-thumb{background:var(--border)}
.vi{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid rgba(255,255,255,.03);transition:all .15s}
.vi:hover{background:rgba(232,149,42,.06);border-left-color:var(--adim)}
.vi.sel{background:var(--aglow);border-left-color:var(--amber)}
.vn{font-size:12px;font-weight:700;letter-spacing:.04em;margin-bottom:2px}
.vtag{font-size:8px;font-weight:700;letter-spacing:.1em;padding:1px 5px;text-transform:uppercase}
.tag-vlcc{color:var(--red);border:1px solid rgba(232,58,58,.4)}
.tag-suez{color:var(--yellow);border:1px solid rgba(245,158,11,.4)}
.tag-afra{color:var(--cyan);border:1px solid rgba(45,224,200,.4)}
.vbar{display:flex;align-items:center;gap:5px;margin-top:4px}
.bt{flex:1;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px}
.bl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--td);min-width:26px;text-align:right}
.mc{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0;width:100%;height:100%}
.mgrid{position:absolute;inset:0;pointer-events:none;z-index:400;background-image:linear-gradient(rgba(232,149,42,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,149,42,.03) 1px,transparent 1px);background-size:60px 60px}
.mcoords{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:500;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--td);background:rgba(10,12,16,.85);padding:3px 10px;border:1px solid var(--border);white-space:nowrap;pointer-events:none}
.zoom-reset{position:absolute;top:12px;right:12px;z-index:500;background:rgba(10,12,16,.9);border:1px solid var(--border);color:var(--amber);padding:5px 10px;font-size:9px;font-family:'Share Tech Mono',monospace;cursor:pointer}
.mstats{position:absolute;bottom:16px;left:12px;z-index:500;display:flex;gap:7px}
.sb{background:rgba(10,12,16,.92);border:1px solid var(--border);padding:7px 12px}
.slb{font-size:8px;font-weight:700;letter-spacing:.12em;color:var(--td);text-transform:uppercase;margin-bottom:1px}
.svv{font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--amber);line-height:1}
.suu{font-size:9px;color:var(--td);margin-top:1px}
.rp{width:280px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.rp::-webkit-scrollbar{width:2px}
.rp::-webkit-scrollbar-thumb{background:var(--border)}
.rp.empty{justify-content:center;align-items:center}
.es{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:.4;font-size:10px;letter-spacing:.15em;text-transform:uppercase}
.dh{padding:13px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(232,149,42,.07),transparent)}
.dvn{font-size:16px;font-weight:900;text-transform:uppercase}
.dmmsi{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--amber);margin-top:2px}
.dflag{font-size:10px;color:var(--td);margin-top:4px}
.sv2{padding:12px 14px;border-bottom:1px solid var(--border)}
.tg{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:10px}
.tc2{aspect-ratio:1;border:1px solid rgba(255,255,255,.1);border-radius:1px;position:relative;overflow:hidden;background:rgba(255,255,255,.02)}
.tf{position:absolute;bottom:0;left:0;right:0}
.tc2.full .tf{background:linear-gradient(to top,var(--amber),var(--yellow))}
.tc2.partial .tf{background:linear-gradient(to top,#b8721a,var(--adim))}
.sn{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sni{background:var(--bg2);padding:7px 9px;border:1px solid var(--border)}
.snl{font-size:8px;font-weight:600;letter-spacing:.1em;color:var(--td);text-transform:uppercase;margin-bottom:2px}
.snv{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--amber)}
.snu{font-size:8px;color:var(--td)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.dc{background:var(--bg1);padding:8px 10px}
.dcl{font-size:8px;font-weight:600;letter-spacing:.1em;color:var(--td);text-transform:uppercase;margin-bottom:2px}
.dcv{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--tp)}
.dcv.ok{color:var(--green)}.dcv.warn{color:var(--amber)}.dcv.crit{color:var(--red)}
.rs{padding:11px 14px;border-bottom:1px solid var(--border)}
.rl{display:flex;align-items:center;margin-top:8px}
.rport{font-size:11px;font-weight:700}
.rarrow{flex:1;height:1px;background:linear-gradient(to right,var(--adim),transparent,var(--adim));margin:0 7px;position:relative}
.rarrow::after{content:'►';position:absolute;right:-4px;top:-7px;font-size:8px;color:var(--amber)}
.rprog{margin-top:7px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.rpf{height:100%;background:linear-gradient(to right,var(--adim),var(--amber));border-radius:2px}
.rpct{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--td);margin-top:3px}
.overlay{display:none;position:absolute;inset:0;background:var(--bg0);z-index:600;overflow-y:auto}
.overlay.active{display:block}
.overlay::-webkit-scrollbar{width:3px}
.overlay::-webkit-scrollbar-thumb{background:var(--border)}
.ov-inner{padding:16px;display:flex;flex-direction:column;gap:10px}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sec-title.purple{color:#a78bfa;border-color:rgba(167,139,250,.3)}
.risk-badge{display:inline-block;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid}
.risk-low{color:var(--green);border-color:rgba(45,232,122,.4);background:rgba(45,232,122,.08)}
.risk-med{color:var(--yellow);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.risk-high{color:var(--red);border-color:rgba(232,58,58,.4);background:rgba(232,58,58,.08)}
.risk-crit{color:#ff6b6b;border-color:rgba(255,107,107,.6);background:rgba(255,107,107,.12);animation:rp2 1.5s infinite}
@keyframes rp2{0%,100%{opacity:1}50%{opacity:.5}}
.si{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px}
.siu{background:var(--green)}.sia{background:var(--amber)}.sil{background:var(--cyan)}
.leaflet-tile-pane{filter:brightness(.45) saturate(.2) hue-rotate(195deg) contrast(1.1)}
.leaflet-container{background:#050608!important}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--amber)!important;border-color:var(--border)!important}
.leaflet-popup-content-wrapper{background:var(--bg2);border:1px solid var(--bb);border-radius:0;color:var(--tp);font-family:'Barlow Condensed',sans-serif}
.leaflet-popup-tip{background:var(--bg2)}
.leaflet-popup-content{margin:10px 14px;font-size:12px}
</style>
</head>

function renderEIA(){
  var d=EIA;var mx=Math.max.apply(null,d.weeks.map(function(w){return w.v;}));var mn=Math.min.apply(null,d.weeks.map(function(w){return w.v;}));var rng=mx-mn||1;
  var bars=d.weeks.map(function(w,i){var h=Math.round(((w.v-mn)/rng)*60)+18;var isL=i===d.weeks.length-1;var clr=isL?(d.chg>0?"var(--red)":"var(--green)"):"rgba(232,149,42,.45)";return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="font-family:Share Tech Mono,monospace;font-size:7px;color:'+(isL?"var(--amber)":"transparent")+';text-align:center">'+w.v+'</div><div style="width:100%;height:'+h+'px;border-radius:2px 2px 0 0;background:'+clr+';'+(isL?'border:1px solid var(--amber)':'')+';"></div><div style="font-family:Share Tech Mono,monospace;font-size:7px;color:var(--td);text-align:center">'+w.w.replace("Mar ","M").replace("Feb ","F")+'</div></div>';}).join("");
  var html='<div class="sec-title purple">US EIA CRUDE INVENTORY</div>'
  +'<div style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);padding:9px 12px;font-size:10px;color:var(--td);line-height:1.6">Weekly EIA report. <span style="color:var(--amber)">Next: '+d.next+'</span></div>'
  +'<div style="background:var(--bg2);border:1px solid var(--border);padding:14px"><div style="font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--amber);text-transform:uppercase;margin-bottom:10px">6-WEEK TREND (Million Barrels)</div><div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:4px">'+bars+'</div></div>'
  +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
  +'<div style="background:var(--bg2);border:1px solid var(--border);padding:9px 10px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:3px">Current</div><div style="font-family:Share Tech Mono,monospace;font-size:18px;color:var(--amber)">'+d.cur+'M</div><div style="font-size:9px;color:var(--td)">million bbls</div></div>'
  +'<div style="background:var(--bg2);border:1px solid var(--border);padding:9px 10px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:3px">Week Change</div><div style="font-family:Share Tech Mono,monospace;font-size:18px;color:'+(d.chg>0?"var(--red)":"var(--green)")+'">+'+(d.chg)+'M</div><div style="font-size:9px;color:var(--td)">'+d.dir+'</div></div>'
  +'<div style="background:var(--bg2);border:1px solid var(--border);padding:9px 10px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:3px">5yr Average</div><div style="font-family:Share Tech Mono,monospace;font-size:18px;color:var(--td)">'+d.avg5y+'M</div><div style="font-size:9px;color:var(--td)">'+(d.cur>d.avg5y?"ABOVE avg":"BELOW avg")+'</div></div></div>'
  +'<div style="padding:10px 12px;border:1px solid '+(d.chg>0?"rgba(232,58,58,.4)":"rgba(45,232,122,.4)")+';background:'+(d.chg>0?"rgba(232,58,58,.05)":"rgba(45,232,122,.05)")+'"><div style="font-size:9px;font-weight:700;letter-spacing:.15em;color:'+(d.chg>0?"var(--red)":"var(--green)")+';text-transform:uppercase;margin-bottom:4px">PRICE IMPACT: '+d.impact+'</div><div style="font-size:11px;color:var(--td);line-height:1.6">'+d.detail+'</div></div>';
  document.getElementById("eia-content").innerHTML=html;
}

function renderHurricane(){
  var html='<div class="sec-title purple">STORM &amp; OIL IMPACT TRACKER</div><div style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);padding:9px 12px;font-size:10px;color:var(--td);line-height:1.6">Tracking storms near oil regions. <span style="color:var(--amber)">Gulf of Mexico: ~1.8 mb/d US offshore crude.</span></div>';
  STORMS.forEach(function(s){
    var bc=s.active?"rgba(232,58,58,.5)":"var(--border)";var bg=s.active?"rgba(232,58,58,.04)":"transparent";
    var wc=s.wind>110?"var(--red)":s.wind>74?"var(--amber)":"var(--cyan)";
    html+='<div style="background:var(--bg2);border:1px solid '+bc+';padding:12px 14px;background-color:'+bg+'"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:15px;font-weight:900;text-transform:uppercase">'+s.name+'</span><span style="padding:2px 7px;font-size:9px;font-weight:700;border:1px solid var(--amber);color:var(--amber)">'+s.cat+'</span>'+(s.active?'<span style="font-size:9px;color:var(--red);font-family:Share Tech Mono,monospace;animation:rp2 1.2s infinite">ACTIVE</span>':'')+'</div><div style="font-size:10px;color:var(--td);margin-bottom:8px">'+s.loc+'</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px"><div style="background:var(--bg3);padding:6px 8px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:2px">Max Wind</div><div style="font-family:Share Tech Mono,monospace;font-size:10px;color:'+wc+'">'+s.wind+' mph</div></div><div style="background:var(--bg3);padding:6px 8px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:2px">Pressure</div><div style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--tp)">'+s.pres+' mb</div></div><div style="background:var(--bg3);padding:6px 8px"><div style="font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:2px">Movement</div><div style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--td)">'+s.mv+'</div></div></div><div style="font-size:10px;color:var(--td);margin-bottom:6px;padding:5px 7px;background:var(--bg3);border:1px solid var(--border)"><b style="color:var(--tp)">Track:</b> '+s.track+'</div><div style="border-left:2px solid '+(s.active?"var(--red)":"var(--amber)")+';padding-left:8px;font-size:10px;color:var(--td);line-height:1.55"><div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:'+(s.active?"var(--red)":"var(--amber)")+';margin-bottom:3px">OIL IMPACT</div>'+s.oil+'<div style="margin-top:4px;color:var(--amber)">'+s.pipe+'</div></div></div>';
  });
  document.getElementById("hurricane-content").innerHTML=html;
}

var tabMap={tracking:null,routes:"ov-routes",storage:"ov-storage",analytics:"ov-analytics",chokepoints:"ov-chokepoints",georisk:"ov-georisk",eia:"ov-eia",hurricane:"ov-hurricane"};
var renderers={routes:renderRoutes,storage:renderStorage,analytics:renderAnalytics,chokepoints:renderChokepoints,georisk:renderGeoRisk,eia:renderEIA,hurricane:renderHurricane};

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll(".navtab").forEach(function(t){t.classList.remove("active");});btn.classList.add("active");
  document.querySelectorAll(".overlay").forEach(function(o){o.classList.remove("active");});
  if(tab==="chokepoints"){renderChokepoints();renderChMarkers();}
  else{Object.values(CK).forEach(function(m){map.removeLayer(m);});CK={};}
  if(renderers[tab])renderers[tab]();
  if(tabMap[tab])document.getElementById(tabMap[tab]).classList.add("active");
}

function filt(f,b){cf=f;document.querySelectorAll(".fb").forEach(function(x){x.classList.remove("active");});b.classList.add("active");renderList();}

setInterval(function(){var n=new Date();document.getElementById("clk").textContent=String(n.getUTCHours()).padStart(2,"0")+":"+String(n.getUTCMinutes()).padStart(2,"0")+":"+String(n.getUTCSeconds()).padStart(2,"0")+" UTC";},1000);

setInterval(function(){
  V.forEach(function(v){
    if(v.st==="underway"){var r=v.hdg*Math.PI/180;v.lat+=Math.cos(r)*.018+(Math.random()-.5)*.004;v.lng+=Math.sin(r)*.018+(Math.random()-.5)*.004;v.spd=parseFloat((v.spd+(Math.random()-.5)*.1).toFixed(1));if(MK[v.id])MK[v.id].setLatLng([v.lat,v.lng]);}
  });
  if(sel){sel=V.find(function(v){return v.id===sel.id;});detail();}
},3000);

renderList();renderMarkers();stats();
</script>
