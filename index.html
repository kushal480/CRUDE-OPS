<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hormuz Command Center - V3.5 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020408; color: #d1d5db; font-family: 'JetBrains+Mono', monospace; margin: 0; padding: 0; }
        .palantir-border { border: 1px solid rgba(16, 185, 129, 0.2); }
        .bg-obsidian { background: #0a0f18; }
        #map { height: 100%; width: 100%; min-height: 400px; background: #050505; }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #065f46; border-radius: 10px; }
        .dashboard-container { display: grid; grid-template-columns: 350px 1fr 350px; grid-template-rows: auto 1fr auto; height: 100vh; gap: 1rem; padding: 1rem; }
        @media (max-width: 1200px) { .dashboard-container { grid-template-columns: 1fr; height: auto; overflow-y: auto; } }
    </style>
</head>
<body class="overflow-hidden">

    <div class="dashboard-container">
        <!-- Header -->
        <header class="col-span-full flex justify-between items-center palantir-border p-4 bg-obsidian rounded-lg">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-emerald-500 uppercase flex items-center gap-2">
                    <i class="fas fa-microchip"></i> HORMUZ NEURAL COMMAND
                </h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Global Ops // Active Deployment</p>
            </div>
            <div class="flex items-center gap-4">
                <button id="set-key-btn" class="bg-red-900/20 border border-red-500/50 text-red-400 px-3 py-1 rounded text-[10px] hover:bg-red-900/40 transition-all">
                    <i class="fas fa-key"></i> CONFIGURE API KEY
                </button>
                <div class="text-right border-l border-gray-800 pl-4">
                    <div id="clock" class="text-lg font-bold text-white tracking-widest">00:00:00 UTC</div>
                </div>
            </div>
        </header>

        <!-- Left Panel -->
        <aside class="flex flex-col gap-4 overflow-hidden">
            <div class="palantir-border bg-obsidian p-4 rounded-lg flex flex-col h-1/2 overflow-hidden">
                <h2 class="text-xs font-bold text-emerald-500 mb-3 uppercase tracking-widest border-b border-emerald-900/30 pb-1">Asset Telemetry</h2>
                <div id="vessel-list" class="space-y-2 overflow-y-auto terminal-scroll text-[11px]"></div>
            </div>
            <div class="palantir-border bg-obsidian flex-grow p-4 rounded-lg flex flex-col overflow-hidden">
                <h2 class="text-xs font-bold text-emerald-500 mb-3 uppercase tracking-widest border-b border-emerald-900/30 pb-1">Neural Terminal</h2>
                <div id="chat-output" class="flex-grow overflow-y-auto terminal-scroll text-[11px] space-y-3 mb-3">
                    <div class="text-emerald-900 font-bold">[SYSTEM]: Ready for input.</div>
                </div>
                <input id="chat-input" type="text" placeholder="Command..." class="w-full bg-black border border-emerald-900/50 rounded p-2 text-xs text-emerald-400 focus:outline-none">
            </div>
        </aside>

        <!-- Map Panel -->
        <main class="palantir-border bg-black rounded-lg overflow-hidden relative">
            <div id="map"></div>
        </main>

        <!-- Right Panel -->
        <aside class="flex flex-col gap-4 overflow-hidden">
            <div class="palantir-border bg-obsidian flex-grow rounded-lg flex flex-col overflow-hidden">
                <div class="p-4 border-b border-emerald-900/30 bg-black/40 flex justify-between items-center">
                    <h2 class="text-xs font-bold text-emerald-500 uppercase">Intelligence Feed</h2>
                    <button id="scan-btn" class="bg-emerald-900/40 text-emerald-400 px-3 py-1 rounded text-[10px] border border-emerald-500/30">REFRESH</button>
                </div>
                <div id="report-content" class="p-5 flex-grow overflow-y-auto terminal-scroll text-[12px] leading-relaxed">
                    <p class="text-red-500 animate-pulse font-bold">WARNING: API KEY REQUIRED FOR NEURAL ANALYSIS.</p>
                </div>
            </div>
        </aside>

        <!-- Footer -->
        <footer class="col-span-full flex justify-between text-[10px] text-gray-600 uppercase tracking-widest pt-2 border-t border-gray-900">
            <div>GRID_LOC: 26.5822N 56.2410E</div>
            <div><i class="fas fa-shield-alt"></i> SECURE_CONNECTION_STABLE</div>
        </footer>
    </div>

    <script>
        let USER_API_KEY = localStorage.getItem('GEMINI_KEY') || "";

        const vessels = [
            { id: 'MT-VALIANT', name: 'ZHEN HUA 33', lat: 26.55, lng: 56.40 },
            { id: 'CV-MARINER', name: 'GLORY TRADER', lat: 26.68, lng: 56.12 },
            { id: 'DD-DEFENDER', name: 'ALBORZ (72)', lat: 26.32, lng: 56.35 }
        ];

        // Map Init
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.58, 56.24], 9);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Ensure map renders correctly
        setTimeout(() => { map.invalidateSize(); }, 500);

        function updateVessels() {
            const list = document.getElementById('vessel-list');
            list.innerHTML = '';
            vessels.forEach(v => {
                const item = document.createElement('div');
                item.className = "p-2 border border-emerald-900/20 bg-black/40 rounded mb-2 cursor-pointer hover:bg-emerald-500/10";
                item.innerHTML = `<div class="text-cyan-400 font-bold">${v.id}</div><div class="text-gray-500">${v.name}</div>`;
                item.onclick = () => map.flyTo([v.lat, v.lng], 11);
                list.appendChild(item);
                L.circleMarker([v.lat, v.lng], { radius: 6, color: '#10b981', fillOpacity: 0.8 }).addTo(map);
            });
        }

        async function fetchIntel() {
            if (!USER_API_KEY) {
                document.getElementById('report-content').innerHTML = "<p class='text-red-500'>Error: Please click 'CONFIGURE API KEY' at the top and enter your Gemini API Key.</p>";
                return;
            }

            document.getElementById('report-content').innerHTML = "<div class='text-emerald-500 animate-pulse'>Fetching real-time intelligence...</div>";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${USER_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Analyze current Strait of Hormuz situation and oil prices. Return professional Bengali report." }] }],
                        tools: [{ "google_search": {} }]
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                document.getElementById('report-content').innerHTML = text.replace(/\n/g, '<br>');
            } catch (e) {
                document.getElementById('report-content').innerHTML = "<p class='text-red-500'>Connection failed. Check your API Key.</p>";
            }
        }

        document.getElementById('set-key-btn').onclick = () => {
            const key = prompt("Enter your Gemini API Key:", USER_API_KEY);
            if (key) {
                localStorage.setItem('GEMINI_KEY', key);
                USER_API_KEY = key;
                alert("API Key Saved! Click Refresh to scan.");
            }
        };

        document.getElementById('scan-btn').onclick = fetchIntel;
        
        window.onload = () => {
            updateVessels();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString() + " UTC"; }, 1000);
        };
    </script>
</body>
</html>
